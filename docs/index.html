<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Harness Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f7f4ef;
    --ink: #1a1814;
    --muted: #5c564c;
    --line: #ddd4c6;
    --panel: #fffdf9;
    --soft: #f0ebe2;
    --ok: #1b6b45;
    --ok-soft: #e7f4ec;
    --warn: #8a4b00;
    --warn-soft: #f6ecd9;
    --bad: #9b2c2c;
    --bad-soft: #f7e8e6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Source Sans 3", "Segoe UI", sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, #fbf8f2 0%, var(--bg) 28%, #f3eee5 100%);
    line-height: 1.45;
    min-height: 100vh;
  }
  main { max-width: 720px; margin: 0 auto; padding: 40px 18px 80px; }
  .kicker {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin: 0 0 10px;
  }
  h1 {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 2.1rem; line-height: 1.15; margin: 0 0 10px;
    letter-spacing: -0.02em; font-weight: 700;
  }
  .one-liner {
    font-size: 1.05rem; color: var(--muted); margin: 0 0 22px; max-width: 38rem;
  }
  .one-liner strong { color: var(--ink); font-weight: 600; }
  .health { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 28px; }
  .pill {
    font-size: 0.84rem; background: var(--panel); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 11px; color: var(--muted);
  }
  .pill b { color: var(--ink); font-weight: 600; }
  .pill.ok { background: var(--ok-soft); border-color: #b9d9c5; color: var(--ok); }
  .pill.bad { background: var(--bad-soft); border-color: #e2b4ae; color: var(--bad); }
  .pill.warn { background: var(--warn-soft); border-color: #e2c790; color: var(--warn); }
  .alert {
    background: var(--warn-soft); border: 1px solid #e2c790; color: #5a3600;
    border-radius: 10px; padding: 11px 13px; margin: 0 0 20px; font-size: 0.92rem;
  }
  h2 {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 1.35rem; margin: 0 0 6px; font-weight: 700;
  }
  .sec-help { color: var(--muted); font-size: 0.95rem; margin: 0 0 16px; }
  .sec { margin: 0 0 34px; }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 18px; margin: 0 0 14px;
  }
  .what {
    display: inline-block; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--soft); color: var(--muted);
    border-radius: 6px; padding: 3px 8px; margin: 0 0 10px;
  }
  .card h3 { font-size: 1.08rem; margin: 0 0 8px; font-weight: 700; line-height: 1.3; }
  .card .text { margin: 0 0 14px; color: #2c2822; font-size: 0.98rem; }
  .card .more { margin: -6px 0 14px; color: var(--muted); font-size: 0.88rem; }
  .choices { display: grid; gap: 8px; }
  .choice {
    display: grid; grid-template-columns: 150px 1fr; gap: 10px; align-items: center;
    background: var(--soft); border: 1px solid transparent; border-radius: 10px;
    padding: 8px 10px;
  }
  .choice:hover { border-color: var(--line); background: #ebe5da; }
  a.btn {
    display: inline-block; text-align: center; text-decoration: none;
    font-weight: 700; font-size: 0.88rem; border-radius: 8px;
    padding: 9px 10px; border: 1px solid transparent; font-family: inherit;
  }
  a.btn.reject { background: var(--bad-soft); color: var(--bad); border-color: #e2b4ae; }
  a.btn.defer { background: #fff; color: var(--ink); border-color: var(--line); }
  a.btn.promote, a.btn.resolve {
    background: var(--warn-soft); color: var(--warn); border-color: #e2c790;
  }
  a.btn.dismiss { background: var(--ok-soft); color: var(--ok); border-color: #b9d9c5; }
  .effect { font-size: 0.86rem; color: var(--muted); }
  .effect b { color: var(--ink); font-weight: 600; }
  .note-wrap { margin-top: 10px; }
  .note-wrap label {
    display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted);
    margin-bottom: 4px;
  }
  input.note {
    width: 100%; border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 11px; font: inherit; background: #fff; color: var(--ink);
  }
  input.note:focus { outline: 2px solid #d2c3a4; border-color: #c2b08a; }
  .empty {
    background: var(--ok-soft); color: var(--ok); border: 1px solid #b9d9c5;
    border-radius: 12px; padding: 16px; font-size: 0.98rem;
  }
  details.morebox {
    border-top: 1px solid var(--line); padding-top: 18px; margin-top: 8px;
  }
  details.morebox > summary {
    cursor: pointer; font-weight: 700; color: var(--muted); list-style: none;
  }
  details.morebox > summary::-webkit-details-marker { display: none; }
  details.morebox > summary::before { content: "+ "; font-family: "IBM Plex Mono", monospace; }
  details.morebox[open] > summary::before { content: "− "; }
  .more-body { margin-top: 12px; color: var(--muted); font-size: 0.92rem; }
  .more-body ul { margin: 8px 0; padding-left: 1.15rem; }
  .more-body li { margin: 0 0 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 8px; }
  th, td { text-align: left; padding: 7px 4px; border-bottom: 1px solid var(--line); color: var(--ink); }
  th { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .err { color: var(--bad); }
  footer { margin-top: 36px; color: var(--muted); font-size: 0.8rem; }
  footer code { font-family: "IBM Plex Mono", monospace; font-size: 0.75rem; }
  @media (max-width: 640px) {
    .choice { grid-template-columns: 1fr; gap: 4px; }
    a.btn { width: 100%; }
    h1 { font-size: 1.7rem; }
  }
</style>
</head>
<body>
<main>
  <p class="kicker">Harness Review</p>
  <h1>What should happen next?</h1>
  <p class="one-liner" id="lede">
    Each button opens a GitHub Issue. The cluster reads it within about an hour and
    <strong>either does the action or tells you what to do on FASRC</strong>.
  </p>
  <div id="alert" class="alert" style="display:none;"></div>
  <div class="health" id="health"></div>

  <section class="sec" id="todo"></section>
  <section class="sec" id="extra"></section>

  <footer>
    Updated <span id="generated">…</span> ·
    <code>~/harness/bin/review-publish</code>
  </footer>
</main>
<script>
const REPO = "KadenZheng/harness-review";
const ISSUES_NEW = "https://github.com/" + REPO + "/issues/new";

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function issueUrl(type, id, verdict, note, subjectPath, subjectSha256) {
  const generated = new Date().toISOString().replace(/\.\d{3}Z$/, "");
  const trimmed = (note && note.trim() ? note.trim() : "").slice(0, 500);
  const noteLine = trimmed ? JSON.stringify(trimmed) : '""';
  // INDEX_HTML is a Python raw string: use \n so JS gets a real newline.
  const body =
    "---\n" +
    "type: " + JSON.stringify(type) + "\n" +
    "id: " + JSON.stringify(id) + "\n" +
    "verdict: " + JSON.stringify(verdict) + "\n" +
    "subject_path: " + JSON.stringify(subjectPath) + "\n" +
    "subject_sha256: " + JSON.stringify(subjectSha256) + "\n" +
    "note: " + noteLine + "\n" +
    "source: harness-review-pages\n" +
    "generated: " + generated + "\n" +
    "---\n\n" +
    "Queued from the harness-review status page. The cluster poller will apply or refuse this decision per governance.\n" +
    "Do not edit the --- front matter or remove the harness-decision label.\n";
  const title = "[harness-decision] " + verdict + " " + id;
  const u = new URL(ISSUES_NEW);
  u.searchParams.set("title", title);
  u.searchParams.set("body", body);
  u.searchParams.set("labels", "harness-decision");
  return u.toString();
}

function choices(type, id, subjectPath, subjectSha256, rows) {
  const noteId = "note-" + id.replace(/[^a-zA-Z0-9_-]/g, "_");
  const opts = rows.map(([verdict, label, cls, effect]) => {
    return '<div class="choice">' +
      '<a class="btn ' + cls + '" href="#" data-type="' + esc(type) +
      '" data-id="' + esc(id) + '" data-verdict="' + esc(verdict) +
      '" data-subject-path="' + esc(subjectPath) +
      '" data-subject-sha256="' + esc(subjectSha256) +
      '" data-note-id="' + noteId + '">' + esc(label) + "</a>" +
      '<div class="effect">' + effect + "</div></div>";
  }).join("");
  return '<div class="choices">' + opts + "</div>" +
    '<div class="note-wrap"><label for="' + noteId + '">Optional note</label>' +
    '<input class="note" id="' + noteId + '" placeholder="Why you chose this (optional)"/></div>';
}

function wire(root) {
  root.querySelectorAll("a.btn[data-verdict]").forEach((a) => {
    a.addEventListener("click", (e) => {
      e.preventDefault();
      const noteEl = document.getElementById(a.dataset.noteId);
      window.open(issueUrl(a.dataset.type, a.dataset.id, a.dataset.verdict,
                           noteEl ? noteEl.value : "", a.dataset.subjectPath,
                           a.dataset.subjectSha256), "_blank");
    });
  });
}

function render(data) {
  const pending = (data.candidates || []).filter((c) => c.pending);
  const decided = (data.candidates || []).filter((c) => !c.pending);
  const dream = data.dream;
  const dreamItems = (dream && dream.items) ? dream.items : [];
  const digest = data.digest;
  const poller = data.poller;
  const n = pending.length + dreamItems.length;

  document.getElementById("generated").textContent = data.generated || "?";
  document.getElementById("lede").innerHTML = n
    ? ("Below are <strong>" + n + " decision(s)</strong>. Each button opens a GitHub Issue. " +
       "Within about an hour the cluster <strong>does the action or replies with next steps</strong>.")
    : "Nothing needs a decision right now. Health is below; older history is tucked under “More”.";

  const alert = document.getElementById("alert");
  if (!poller || !poller.at || poller.stale || poller.ok === false || poller.truncated) {
    alert.style.display = "block";
    if (poller && poller.truncated) {
      alert.textContent = "Too many open Issues (≥50). Close some on GitHub so the poller can see new ones.";
    } else if (!poller || !poller.at) {
      alert.textContent = "The cluster poller has not checked in yet — decisions may wait until it runs.";
    } else if (poller.ok === false) {
      alert.textContent = "Last poller run failed (" + poller.at + "). Decisions may be stuck until FASRC gh auth is fixed.";
    } else {
      alert.textContent = "Poller looks stale (last seen " + poller.at + "). It should run hourly when the cluster is awake.";
    }
  } else {
    alert.style.display = "none";
  }

  const pollerOk = poller && poller.at && !poller.stale && poller.ok !== false;
  let health = '<div class="pill ' + (n ? "warn" : "ok") + '"><b>' +
    (n ? (n + " to decide") : "Inbox clear") + "</b></div>";
  health += '<div class="pill ' + (pollerOk ? "ok" : "bad") + '">' +
    (poller && poller.at ? ("Poller OK · " + esc(poller.at)) : "Poller unseen") + "</div>";
  if (digest) {
    health += '<div class="pill ' + (digest.suite_ok ? "ok" : "bad") + '">Suite ' +
      esc(digest.suite) + "</div>";
  }
  document.getElementById("health").innerHTML = health;

  const todo = document.getElementById("todo");
  let html = "";

  if (!n) {
    html += '<div class="empty">All caught up — no candidates or memory items waiting.</div>';
  } else {
    html += "<h2>Needs a decision</h2>" +
      '<p class="sec-help">Pick one outcome per item. Beside each button: what happens after you click.</p>';
  }

  pending.forEach((c) => {
    html += '<article class="card">' +
      '<div class="what">Harness change proposal</div>' +
      "<h3>" + esc(c.slug) + "</h3>" +
      '<p class="text">' + esc(c.target) + "</p>" +
      (c.validation ? '<p class="more">Validation so far: ' + esc(c.validation) + "</p>" : "") +
      choices("candidate", c.id, c.subject_path, c.subject_sha256, [
        ["reject", "Reject", "reject",
         "<b>Done by poller.</b> Marks this proposal rejected and keeps the rationale."],
        ["defer", "Defer", "defer",
         "<b>Done by poller.</b> Parks it for later without rejecting."],
        ["promote", "Promote later", "promote",
         "<b>Not automatic.</b> Opens a ticket. You still apply the recipe on FASRC, then close the Issue."],
      ]) + "</article>";
  });

  dreamItems.forEach((it) => {
    const id = it.id || ("dream-" + dream.store + "-item" + it.n);
    html += '<article class="card">' +
      '<div class="what">Memory judgment · item ' + esc(String(it.n)) + "</div>" +
      "<h3>Should the memory store change?</h3>" +
      '<p class="text">' + esc(it.text) + "</p>" +
      choices("dream", id, it.subject_path, it.subject_sha256, [
        ["dismiss", "Leave as-is", "dismiss",
         "<b>Done by poller.</b> Keeps current memory text and notes that you dismissed this."],
        ["resolve", "Fix later", "resolve",
         "<b>Not automatic.</b> Opens a ticket. You fix it in an interactive session on FASRC, then close the Issue."],
      ]) + "</article>";
  });

  todo.innerHTML = html;

  const sched = data.schedules || {};
  let extra =
    '<details class="morebox"><summary>More (history, notes, schedules)</summary><div class="more-body">';
  if (digest && digest.notes && digest.notes.length) {
    extra += "<p><b>Latest evaluator notes</b></p><ul>" +
      digest.notes.map((n) => "<li>" + esc(n) + "</li>").join("") + "</ul>";
  }
  if (decided.length) {
    extra += "<p><b>Earlier candidates</b></p><table><thead><tr><th>Candidate</th><th>Status</th></tr></thead><tbody>" +
      decided.map((c) => "<tr><td>" + esc(c.slug) + "</td><td>" + esc(c.status) +
        "</td></tr>").join("") + "</tbody></table>";
  }
  extra += "<p><b>When things run</b><br/>Dream-sweep " + esc(sched.dream || "Sun 05:00") +
    " · Digest " + esc(sched.digest || "Mon 08:00") +
    " · Poller " + esc(sched.poller || "hourly") + "</p>";
  extra += '<p><a href="https://github.com/' + REPO +
    '/issues?q=label%3Aharness-decision" target="_blank" rel="noopener">See queued GitHub Issues</a></p>';
  extra += "</div></details>";
  document.getElementById("extra").innerHTML = extra;

  wire(document);
}

fetch("status.json?ts=" + Date.now())
  .then((r) => { if (!r.ok) throw new Error("status.json " + r.status); return r.json(); })
  .then(render)
  .catch((e) => {
    document.getElementById("lede").innerHTML =
      '<span class="err">Failed to load status.json: ' + esc(e.message) + "</span>";
  });
</script>
</body>
</html>
